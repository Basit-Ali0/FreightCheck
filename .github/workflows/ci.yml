# CI — backend lint/typecheck/pytest + frontend lint/typecheck/build.
# Live-Gemini / live-Mongo integration tests (marked `@pytest.mark.integration`)
# are excluded here and run in `eval.yml` on secrets-backed workflows.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (from lockfile)
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy src/freightcheck eval

      - name: Pytest (unit + in-process integration)
        run: uv run pytest tests -m "not integration"

  frontend:
    name: Frontend lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Vite build
        run: npm run build
