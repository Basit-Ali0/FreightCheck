# Nightly + PR eval harness (Evaluation Spec §3.4). Requires live Gemini + Mongo secrets.
name: Eval

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - backend/src/freightcheck/agent/prompts.py
      - backend/src/freightcheck/schemas/**
      - knowledge/freightcheck_data_models.md
      - knowledge/freightcheck_prompt_templates.md

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    env:
      EVAL_REPORT_DIR: eval/reports/ci-${{ github.run_id }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Pytest integration (live external services)
        run: uv run pytest tests -m integration -q
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Run eval harness
        run: uv run python -m eval.run --all --output "$EVAL_REPORT_DIR"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Upload eval reports
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-${{ github.run_id }}
          path: backend/${{ env.EVAL_REPORT_DIR }}

      - name: PR comment (summary)
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -f "backend/${{ env.EVAL_REPORT_DIR }}/summary.md"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file "backend/${{ env.EVAL_REPORT_DIR }}/summary.md"
